query searchDatasets($q: String!, $first: Int, $after: String) {
  search(q: $q, first: $first, after: $after) {
    edges {
      node {
        ... on Dataset {
          id
          name
          created
          public
          latestSnapshot {
            tag
            summary {
              modalities
              subjects
              tasks
            }
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
